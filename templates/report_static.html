<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ app_name or package_name }} - 涉诈APP分析报告</title>
    <style>
        /* 内联所有CSS样式 */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; font-family: "Microsoft YaHei", sans-serif; }
        .report-header { text-align: center; margin-bottom: 40px; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 10px; }
        .risk-badge { padding: 5px 15px; border-radius: 20px; font-weight: bold; text-transform: uppercase; }
        .risk-high { background-color: #e74c3c; }
        .risk-medium { background-color: #f39c12; }
        .risk-low { background-color: #27ae60; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin: 20px 0; }
        .info-item { display: flex; justify-content: space-between; padding: 15px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <header class="report-header">
            <h1>网络反诈中心</h1>
            <h2>涉诈APP分析服务报告</h2>
            <div class="app-info">
                <h3>{{ app_name or package_name }}</h3>
                <span class="risk-badge risk-{{ risk_level }}">{{ risk_level|upper }}</span>
            </div>
        </header>

        <main class="report-content">
            <!-- 基本信息 -->
            <section class="info-section">
                <h2>应用基本信息</h2>
                <div class="info-grid">
                    <div class="info-item">
                        <label>应用名称</label>
                        <span>{{ app_name or 'N/A' }}</span>
                    </div>
                    <div class="info-item">
                        <label>包名</label>
                        <span>{{ package_name or 'N/A' }}</span>
                    </div>
                </div>
            </section>

            <!-- 威胁情报 -->
            <section class="threat-section">
                <h2>可调证线索信息</h2>
                <p>威胁信息内容...</p>
            </section>
        </main>
    </div>
    <script>
        // 内联所有JavaScript功能
        console.log('静态HTML报告已加载');
    </script>
</body>
</html>
