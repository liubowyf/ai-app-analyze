services:
  worker:
    container_name: apk-analysis-worker
    image: apk-analysis/backend:d889aee-fix3
    build:
      context: ../..
      dockerfile: Dockerfile.backend
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app
      APP_SOURCE_DIR: ${APP_SOURCE_DIR:-/home/devops/ai-app-analyze}
    volumes:
      - ${APP_SOURCE_DIR:-/home/devops/ai-app-analyze}:/app:ro
    command: >-
      sh -lc "dramatiq workers.task_actor --queues default,static,dynamic,report"
    restart: unless-stopped
