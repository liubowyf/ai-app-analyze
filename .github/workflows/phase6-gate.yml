name: phase6-scheduling-gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  scheduling-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv venv
          ./venv/bin/pip install -r requirements.txt

      - name: Run scheduling gate (fail-fast)
        run: |
          bash scripts/ci_gate_entry.sh
